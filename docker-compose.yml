

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - MSSQL_SA_USER=sa
      - MSSQL_SA_PASSWORD=P@ssw0rd
      - ACCEPT_EULA=Y
    container_name: TraknovaDb
    hostname: TraknovaDb
    restart: unless-stopped
    ports:
      - "1433:1433"
    cap_add:
      - SYS_PTRACE
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "P@ssw0rd" -Q "SELECT 1" -b -o /dev/null -C
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: src/TraknovaTelematics.API/Dockerfile
    container_name: TraknovaApi
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=TraknovaDb,1433;Database=TraknovaTelematics;User Id=sa;Password=P@ssw0rd;TrustServerCertificate=True;
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      db:
        condition: service_healthy
